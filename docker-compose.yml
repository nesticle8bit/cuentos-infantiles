services:
  api:
    build: ./api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nesticle8bit:iHvFjojK2JoLWcxPWc@192.168.1.3:5432/cuentos_infantiles_db}
      PORT: 4000
      CUENTOS_DIR: /cuentos
    volumes:
      - ./cuentos:/cuentos:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
